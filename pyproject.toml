[tool.black]
line-length = 88
target-version = ["py313"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | alembic/versions
)/
'''

[tool.ruff]
line-length = 88
target-version = "py313"
exclude = [
    ".git",
    ".venv",
    "venv",
    "alembic/versions",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
]
ignore = [
    "E501", # Black handles formatting; long strings are often not auto-wrappable
]

[tool.ruff.lint.per-file-ignores]
"alembic/env.py" = ["F401"]
"services/app_service.py" = ["F401"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_configs = true
check_untyped_defs = true
pretty = true
show_error_codes = true
exclude = [
    "alembic/",
]
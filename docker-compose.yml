services:
  postgres:
    image: postgres:16
    container_name: expensesai-postgres
    environment:
      POSTGRES_DB: expenses_ai
      POSTGRES_USER: expenses_user
      POSTGRES_PASSWORD: expenses_password
    volumes:
      - expensesai_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses_user -d expenses_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: expensesai-bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://expenses_user:expenses_password@postgres:5432/expenses_ai
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  expensesai_postgres_data:
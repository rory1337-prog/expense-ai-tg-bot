name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: expenses_user
          POSTGRES_PASSWORD: expenses_password
          POSTGRES_DB: expenses_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expenses_user -d expenses_ai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BOTTOKEN: test_token
      OPENAI_API_KEY: test_key
      DATABASE_URL: postgresql+psycopg2://expenses_user:expenses_password@localhost:5432/expenses_ai_test
      TEST_DATABASE_URL: postgresql+psycopg2://expenses_user:expenses_password@localhost:5432/expenses_ai_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy config.py db repositories services

      - name: Compile Python files
        run: |
          python -m compileall \
            -x '(^|/)(\.git|\.mypy_cache|\.pytest_cache|\.ruff_cache|\.venv|venv)/' \
            .

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: PYTHONPATH=. pytest -q

      - name: Build Docker image
        run: docker build -t expensesai-local .